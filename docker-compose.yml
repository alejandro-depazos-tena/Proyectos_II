version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ufvshares-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ufvsharesdb}
      POSTGRES_USER: ${POSTGRES_USER:-ufvshares}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ufvshares_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ufvshares} -d ${POSTGRES_DB:-ufvsharesdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ufvshares-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ufvsharesdb}
      DB_USER: ${POSTGRES_USER:-ufvshares}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ufvshares_password_change_me}
      DB_DRIVER: org.postgresql.Driver
      JPA_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JPA_DDL_AUTO: update
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_API_URL: ${APP_API_URL:-http://localhost:8080/api}
      APP_SEED_JSON_ENABLED: ${APP_SEED_JSON_ENABLED:-true}
      APP_SEED_JSON_MODE: ${APP_SEED_JSON_MODE:-always}
      APP_SEED_BOOTSTRAP_ADMIN_ENABLED: ${APP_SEED_BOOTSTRAP_ADMIN_ENABLED:-true}
      APP_SEED_BOOTSTRAP_ADMIN_EMAIL: ${APP_SEED_BOOTSTRAP_ADMIN_EMAIL:-admin@ufv.es}
      APP_SEED_BOOTSTRAP_ADMIN_PASSWORD: ${APP_SEED_BOOTSTRAP_ADMIN_PASSWORD:-Admin1234!}
      MAIL_HOST: ${MAIL_HOST:-smtp.office365.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8080/api}
    container_name: ufvshares-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pg-data:
  uploads-data:

version: "3.9"

services:
  db:
    image: mariadb:11.4
    container_name: ufvshares-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password_change_me}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-ufvshare}
      MARIADB_USER: ${MARIADB_USER:-ufvshares}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-ufvshares_password_change_me}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./bbdd/tablas.sql:/docker-entrypoint-initdb.d/01_tablas.sql:ro
      - ./bbdd/datos.sql:/docker-entrypoint-initdb.d/02_datos.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ufvshares-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://db:3306/${MARIADB_DATABASE:-ufvshare}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
      DB_USER: ${MARIADB_USER:-ufvshares}
      DB_PASSWORD: ${MARIADB_PASSWORD:-ufvshares_password_change_me}
      DB_DRIVER: org.mariadb.jdbc.Driver
      JPA_DIALECT: org.hibernate.dialect.MariaDBDialect
      JPA_DDL_AUTO: update
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_API_URL: ${APP_API_URL:-http://localhost:8080/api}
      APP_SEED_JSON_ENABLED: "false"
      MAIL_HOST: ${MAIL_HOST:-smtp.office365.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8080:8080"
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8080/api}
    container_name: ufvshares-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db-data:
  uploads-data:

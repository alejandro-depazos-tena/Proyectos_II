server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:mem:ufvshare;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed.json.enabled=${APP_SEED_JSON_ENABLED:true}
app.seed.json.location=${APP_SEED_JSON_LOCATION:classpath:dev-h2-data.json}

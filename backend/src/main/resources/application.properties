server.port=8080

spring.config.import=optional:file:../.env[.properties]

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/ufvshare;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed.json.enabled=${APP_SEED_JSON_ENABLED:true}
app.seed.json.location=${APP_SEED_JSON_LOCATION:classpath:dev-h2-data.json}
app.seed.json.mode=${APP_SEED_JSON_MODE:if_empty}
app.seed.bootstrap-admin.enabled=${APP_SEED_BOOTSTRAP_ADMIN_ENABLED:true}
app.seed.bootstrap-admin.email=${APP_SEED_BOOTSTRAP_ADMIN_EMAIL:admin@ufv.es}
app.seed.bootstrap-admin.password=${APP_SEED_BOOTSTRAP_ADMIN_PASSWORD:Admin1234!}
app.seed.app-reviews.enabled=${APP_SEED_APP_REVIEWS_ENABLED:true}
app.seed.app-reviews.overwrite-existing=${APP_SEED_APP_REVIEWS_OVERWRITE_EXISTING:false}

app.upload.dir=${APP_UPLOAD_DIR:./uploads}

app.auth.session-ttl-hours=${APP_AUTH_SESSION_TTL_HOURS:720}
app.auth.password-reset-token-ttl-minutes=${APP_AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:30}
app.mail.dev-fallback=${APP_MAIL_DEV_FALLBACK:false}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── URLs de la app ────────────────────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL:https://ufvshares.onrender.com}
app.api.url=${APP_API_URL:http://localhost:8080/api}

# ── Correo saliente (SMTP) ────────────────────────────────────────
# Outlook / Microsoft 365 SMTP:
# - host: smtp.office365.com
# - port: 587
# - TLS: habilitado
spring.mail.host=${MAIL_HOST:smtp.office365.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:soporteufvshares@gmail.com}}

server.error.include-message=always

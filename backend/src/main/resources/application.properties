server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/ufvshare;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed.json.enabled=${APP_SEED_JSON_ENABLED:true}
app.seed.json.location=${APP_SEED_JSON_LOCATION:classpath:dev-h2-data.json}
app.seed.app-reviews.enabled=${APP_SEED_APP_REVIEWS_ENABLED:true}
app.seed.app-reviews.overwrite-existing=${APP_SEED_APP_REVIEWS_OVERWRITE_EXISTING:false}

app.upload.dir=${APP_UPLOAD_DIR:./uploads}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ── URLs de la app ────────────────────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4321}
app.api.url=${APP_API_URL:http://localhost:8080/api}

# ── Correo saliente (SMTP) ────────────────────────────────────────
# Para desarrollo local puedes usar Mailtrap (https://mailtrap.io)
# o un Gmail con App Password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASSWORD:tu_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@ufvshares.com}

server.error.include-message=always

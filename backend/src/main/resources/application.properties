server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/ufvshare;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed.json.enabled=${APP_SEED_JSON_ENABLED:true}
app.seed.json.location=${APP_SEED_JSON_LOCATION:classpath:dev-h2-data.json}

app.upload.dir=${APP_UPLOAD_DIR:./uploads}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
